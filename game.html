<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini FIFA - Version Pro</title>
<style>
body {
    margin: 0;
    background: #1e7f3f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
canvas {
    background: #3cb371;
    border: 5px solid white;
}
</style>
</head>
<body>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let score = 0;
let timeLeft = 60;

const player = {
    x: 450,
    y: 400,
    radius: 15,
    speed: 5
};

const ball = {
    x: 450,
    y: 350,
    radius: 8,
    dx: 0,
    dy: 0,
    friction: 0.98
};

const goalkeeper = {
    x: 400,
    y: 40,
    width: 100,
    height: 15,
    speed: 4
};

const goal = {
    x: 350,
    y: 0,
    width: 200,
    height: 50
};

// Contrôles clavier
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Dessiner terrain
function drawField() {
    ctx.fillStyle = "#3cb371";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.strokeRect(goal.x, goal.y, goal.width, goal.height);
}

// Dessiner joueur
function drawPlayer() {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
    ctx.fillStyle = "blue";
    ctx.fill();
}

// Dessiner ballon
function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
}

// Dessiner gardien
function drawGoalkeeper() {
    ctx.fillStyle = "red";
    ctx.fillRect(goalkeeper.x, goalkeeper.y, goalkeeper.width, goalkeeper.height);
}

// Mouvement joueur
function movePlayer() {
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;
    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;

    // Limites
    player.x = Math.max(player.radius, Math.min(canvas.width-player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(canvas.height-player.radius, player.y));

    // Tir espace
    if(keys[" "]){
        let dx = ball.x - player.x;
        let dy = ball.y - player.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 30){
            ball.dy = -8;
            ball.dx = dx * 0.2;
        }
    }
}

// Physique ballon
function updateBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    ball.dx *= ball.friction;
    ball.dy *= ball.friction;

    // Collision murs
    if(ball.x < ball.radius || ball.x > canvas.width-ball.radius) ball.dx *= -1;
    if(ball.y > canvas.height-ball.radius){
        ball.dy *= -0.8;
        ball.y = canvas.height-ball.radius;
    }

    // But ?
    if(ball.y < 50 && ball.x > goal.x && ball.x < goal.x + goal.width){
        score++;
        resetBall();
    }

    // Gardien IA suit le ballon
    if(ball.x < goalkeeper.x) goalkeeper.x -= goalkeeper.speed;
    if(ball.x > goalkeeper.x + goalkeeper.width) goalkeeper.x += goalkeeper.speed;

    // Arrêt gardien
    if(ball.y < 60 &&
       ball.x > goalkeeper.x &&
       ball.x < goalkeeper.x + goalkeeper.width){
        ball.dy *= -1;
    }
}

function resetBall(){
    ball.x = 450;
    ball.y = 350;
    ball.dx = 0;
    ball.dy = 0;
}

// Affichage score + timer
function drawUI(){
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score : " + score, 20, 30);
    ctx.fillText("Temps : " + timeLeft, 750, 30);
}

// Timer
setInterval(()=>{
    if(timeLeft > 0) timeLeft--;
},1000);

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawField();
    movePlayer();
    updateBall();
    drawPlayer();
    drawBall();
    drawGoalkeeper();
    drawUI();

    if(timeLeft > 0){
        requestAnimationFrame(gameLoop);
    } else {
        ctx.fillStyle="yellow";
        ctx.font="40px Arial";
        ctx.fillText("FIN DU MATCH !", 300, 250);
    }
}

gameLoop();
</script>

</body>
</html>
